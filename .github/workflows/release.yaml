name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    name: Build + push operator image to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # ghcr.io/openzro/openzro-operator — published via the
          # standard GITHUB_TOKEN; the openzro org's package
          # creation policy + workflow permissions are configured
          # to allow this. Tag forms emitted on tag push:
          #   :0.3.2-alpha.1   (semver, no `v` prefix)
          #   :latest          (always points at the most-recent tag)
          images: |
            ghcr.io/openzro/openzro-operator
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          # Multi-arch: openZro K8s self-hosters are split between
          # amd64 (cloud) and arm64 (Raspberry Pi / Graviton / Apple
          # Silicon clusters via colima/lima).
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=openzro-operator
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/openzro/openzro-operator
            org.opencontainers.image.licenses=BSD-3-Clause
            maintainer=dev@openzro.io
