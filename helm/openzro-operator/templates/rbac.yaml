apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openzro-operator.fullname" . }}
  labels:
    {{- include "openzro-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - openzro.io
  resources:
  - ozsetupkeys
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openzro.io
  resources:
  - ozsetupkeys/finalizers
  verbs:
  - update
- apiGroups:
  - openzro.io
  resources:
  - ozsetupkeys/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - openzro.io
  resources:
  - ozgroups
  - ozresources
  - ozroutingpeers
  - ozpolicies
  - setupkeys
  - groups
  - networkrouters
  - networkresources
  - sidecarprofiles
  verbs:
  - get
  - patch
  - update
  - list
  - watch
  - create
  - delete
- apiGroups:
  - openzro.io
  resources:
  - ozgroups/status
  - ozresources/status
  - ozroutingpeers/status
  - ozpolicies/status
  - setupkeys/status
  - groups/status
  - networkrouters/status
  - networkresources/status
  - sidecarprofiles/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - openzro.io
  resources:
  - ozgroups/finalizers
  - ozresources/finalizers
  - ozroutingpeers/finalizers
  - ozpolicies/finalizers
  - setupkeys/finalizers
  - groups/finalizers
  - networkrouters/finalizers
  - networkresources/finalizers
  - sidecarprofiles/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - services/finalizers
  verbs:
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - patch
  - update
  - list
  - watch
  - create
  - delete
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
{{- if or .Values.openzroAPI.keyFromSecret .Values.clusterSecretsPermissions.allowAllSecrets }}
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
{{- if .Values.openzroAPI.keyFromSecret }}
  - patch
  - update
  - create
  - delete
{{- end }}
{{- end }}
{{- if .Values.gatewayAPI.enabled }}
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
    - gatewayclasses
    - gateways
    - httproutes
    - tcproutes
  verbs:
    - get
    - list
    - watch
    - update
    - patch
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
    - gatewayclasses/status
    - gateways/status
    - httproutes/status
    - tcproutes/status
  verbs:
    - update
    - patch
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openzro-operator.fullname" . }}
  labels:
    {{- include "openzro-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openzro-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "openzro-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openzro-operator.fullname" . }}
  labels:
    {{- include "openzro-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openzro-operator.fullname" . }}
  labels:
    {{- include "openzro-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openzro-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "openzro-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
